<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.topbar {
    background:#111827;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

#prova {
    padding:20px;
}

button {
    padding:10px;
    background:#0f172a;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
    <span id="tempo">Tempo: 600s</span>
    <span id="alertas">Saídas: 0</span>
</div>

<div id="prova">

<h2>Prova</h2>

<p>1. Capital do Brasil?</p>
<input type="radio" name="q1" value="errado"> São Paulo<br>
<input type="radio" name="q1" value="certo"> Brasília<br>
<input type="radio" name="q1" value="errado"> Rio<br>

<br>

<p>2. 2 + 2 = ?</p>
<input type="radio" name="q2" value="errado"> 3<br>
<input type="radio" name="q2" value="certo"> 4<br>
<input type="radio" name="q2" value="errado"> 5<br>

<br><br>

<button onclick="finalizar()">Finalizar</button>

</div>

<script>
let tempo = 600;
let saidas = 0;
let bloqueio = false;

// ⏱ TIMER
setInterval(()=>{
    tempo--;
    document.getElementById('tempo').innerText = "Tempo: " + tempo + "s";

    if(tempo <= 0){
        encerrar("Tempo encerrado!");
    }
},1000);

// 🚫 BLOQUEIOS
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('paste', e => e.preventDefault());
document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', function(e) {
    if (e.ctrlKey) e.preventDefault();
});

// 👀 DETECÇÃO DE SAÍDA
document.addEventListener("visibilitychange", function() {
    if (document.hidden && !bloqueio) penalizar();
});

window.onblur = function(){
    if(!bloqueio) penalizar();
};

// ⚠️ PENALIZAÇÃO
function penalizar(){
    bloqueio = true;

    saidas++;
    document.getElementById("alertas").innerText = "Saídas: " + saidas;

    alert("Você saiu da prova!");

    if(saidas >= 1){
        encerrar("Prova reiniciada por saída!");
    }

    setTimeout(()=> bloqueio = false, 2000);
}

// 🔚 FINALIZAÇÃO
function finalizar(){
    let pontos = 0;

    let q1 = document.querySelector('input[name="q1"]:checked');
    let q2 = document.querySelector('input[name="q2"]:checked');

    if(q1 && q1.value === "certo") pontos++;
    if(q2 && q2.value === "certo") pontos++;

    alert("Sua nota: " + pontos);

    encerrar("Prova finalizada!");
}

// 🔄 RESET TOTAL (SEM 404)
function encerrar(msg){
    alert(msg);
    location.reload(); // aqui funciona corretamente pois não muda rota
}
</script>

</body>
</html>
