<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Prova Online</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

#alerta {
    position: fixed;
    top: 0;
    width: 100%;
    background: red;
    color: white;
    text-align: center;
    padding: 10px;
    font-weight: bold;
}

iframe {
    width: 100%;
    height: 100vh;
    border: none;
}
</style>

<script>
// Bloquear botão direito
document.addEventListener("contextmenu", e => e.preventDefault());

// Detectar saída da aba
document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        alert("⚠️ Você saiu da prova! Isso pode invalidar sua avaliação.");
    }
});

// Aviso ao tentar sair
window.onbeforeunload = function() {
    return "Você está em uma avaliação. Deseja sair?";
};

// Tela cheia automática
function entrarTelaCheia() {
    document.documentElement.requestFullscreen();
}

</script>
</head>

<body onload="entrarTelaCheia()">

<div id="alerta">
⚠️ PROVA EM ANDAMENTO - NÃO SAIA DA TELA
</div>

<iframe src="https://forms.office.com/Pages/ResponsePage.aspx?id=1JjG0Ork6U6nnfLXp4OZyAkLBLNSedNApafS5DptQ_BUOUZGSERQT0RDWlVUMldRVU1OTEQ0REpMNy4u"></iframe>

</body>
</html>
