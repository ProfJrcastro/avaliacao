<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.topbar {
    background:#111827;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

iframe {
    width:100%;
    height:90vh;
    border:none;
}
</style>
</head>

<body>

<div class="topbar">
    <span id="tempo">Tempo: 600s</span>
    <span id="alertas">Saídas: 0</span>
</div>

<!-- 🔥 CARREGA A PROVA LOCAL (SEM ERRO 404) -->
<iframe src="prova.html"></iframe>

<script>
let saidas = 0;
let tempo = 600;
let bloqueio = false;

// ⏱ TIMER
setInterval(()=>{
    tempo--;
    document.getElementById('tempo').innerText = "Tempo: " + tempo + "s";

    if(tempo <= 0){
        alert("Tempo encerrado!");
        window.location.href = "final.html";
    }
},1000);

// 🚫 BLOQUEIOS
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('paste', e => e.preventDefault());
document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', function(e) {
    if (e.ctrlKey) e.preventDefault();
});

// 👀 MONITORAMENTO
document.addEventListener("visibilitychange", function() {
    if (document.hidden && !bloqueio) penalizar();
});

window.onblur = function(){
    if(!bloqueio) penalizar();
};

function penalizar(){
    bloqueio = true;

    saidas++;
    document.getElementById("alertas").innerText = "Saídas: " + saidas;

    alert("Você saiu da prova!");

    if(saidas >= 2){
        alert("Prova encerrada!");
        window.location.href = "final.html";
    }

    setTimeout(() => bloqueio = false, 2000);
}
</script>

</body>
</html>
