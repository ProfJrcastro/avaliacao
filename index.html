<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema de Avaliação</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:#fff;
}

/* TOPO */
.topbar {
    background:#020617;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
}

/* CONTEÚDO */
.container {
    max-width:800px;
    margin:30px auto;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

/* BOTÕES */
button {
    background:#2563eb;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

button:hover {
    background:#1d4ed8;
}

/* QUESTÕES */
.questao {
    background:#334155;
    padding:15px;
    margin:15px 0;
    border-radius:8px;
}

/* INPUT */
input {
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:5px;
    border:none;
}

/* ESCONDER */
.hidden { display:none; }

.admin-btn {
    background:#16a34a;
}
</style>
</head>

<body>

<div class="topbar">
    <span id="tempo">Tempo: 600s</span>
    <span id="alertas">Saídas: 0</span>
    <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</div>

<div class="container" id="prova"></div>

<div class="container hidden" id="admin">
    <h2>Painel do Professor</h2>

    <input id="pergunta" placeholder="Digite a pergunta">
    <input id="a" placeholder="Alternativa A">
    <input id="b" placeholder="Alternativa B">
    <input id="c" placeholder="Alternativa C">
    <input id="correta" placeholder="Resposta correta (A, B ou C)">

    <button onclick="addQuestao()">Adicionar Questão</button>

    <h3>Questões</h3>
    <div id="lista"></div>

    <h3>Respostas</h3>
    <button onclick="verRespostas()">Ver respostas</button>
    <pre id="respostas"></pre>
</div>

<script>
let tempo = 600;
let saidas = 0;
let questoes = JSON.parse(localStorage.getItem("questoes")) || [];
let respostas = JSON.parse(localStorage.getItem("respostas")) || [];

// TIMER
setInterval(()=>{
    tempo--;
    document.getElementById("tempo").innerText = "Tempo: " + tempo + "s";

    if(tempo <= 0){
        finalizarProva();
    }
},1000);

// MONITORAMENTO SIMPLES
document.addEventListener("visibilitychange", ()=>{
    if(document.hidden){
        saidas++;
        document.getElementById("alertas").innerText = "Saídas: " + saidas;
        alert("Você saiu da prova!");

        if(saidas >= 1){
            location.reload();
        }
    }
});

// GERAR PROVA
function carregarProva(){
    let html = "<h2>Prova</h2>";

    if(questoes.length === 0){
        html += "<p>Nenhuma questão cadastrada.</p>";
    }

    questoes.forEach((q, i)=>{
        html += `
        <div class="questao">
            <p>${q.pergunta}</p>
            <label><input type="radio" name="q${i}" value="A"> ${q.a}</label><br>
            <label><input type="radio" name="q${i}" value="B"> ${q.b}</label><br>
            <label><input type="radio" name="q${i}" value="C"> ${q.c}</label>
        </div>`;
    });

    html += `<button onclick="finalizarProva()">Finalizar</button>`;

    document.getElementById("prova").innerHTML = html;
}

// FINALIZAR
function finalizarProva(){
    let pontos = 0;
    let resp = [];

    questoes.forEach((q,i)=>{
        let r = document.querySelector(`input[name="q${i}"]:checked`);
        let val = r ? r.value : "-";
        resp.push(val);

        if(val === q.correta) pontos++;
    });

    respostas.push(resp);
    localStorage.setItem("respostas", JSON.stringify(respostas));

    alert("Nota: " + pontos);
    location.reload();
}

// ADMIN LOGIN
function loginAdmin(){
    let senha = prompt("Senha:");
    if(senha === "prof321"){
        document.getElementById("admin").classList.remove("hidden");
        document.getElementById("prova").classList.add("hidden");
        listar();
    }
}

// ADD QUESTÃO
function addQuestao(){
    let q = {
        pergunta: pergunta.value,
        a: a.value,
        b: b.value,
        c: c.value,
        correta: correta.value.toUpperCase()
    };

    if(!q.pergunta) return alert("Preencha a pergunta");

    questoes.push(q);
    localStorage.setItem("questoes", JSON.stringify(questoes));

    alert("Questão adicionada!");
    listar();
}

// LISTAR
function listar(){
    let html = "";

    questoes.forEach((q,i)=>{
        html += `
        <div class="questao">
            ${q.pergunta}
            <br>
            <button onclick="remover(${i})">Excluir</button>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
}

// REMOVER
function remover(i){
    questoes.splice(i,1);
    localStorage.setItem("questoes", JSON.stringify(questoes));
    listar();
}

// VER RESPOSTAS
function verRespostas(){
    document.getElementById("respostas").innerText =
        JSON.stringify(respostas, null, 2);
}

// INIT
carregarProva();
</script>

</body>
</html>
