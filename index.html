<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema de Avaliação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color:#fff;
}

/* TOPO */
.topbar {
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* CONTAINER */
.container {
    max-width:900px;
    margin:40px auto;
    padding:25px;
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* QUESTÕES */
.questao {
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    transition:0.3s;
}

.questao:hover {
    transform: scale(1.01);
}

/* BOTÕES */
button {
    background: linear-gradient(135deg,#2563eb,#3b82f6);
    border:none;
    padding:12px 18px;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover {
    transform: translateY(-2px);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:none;
}

/* ADMIN */
.hidden { display:none; }

.admin-btn {
    background:#16a34a;
}

/* TÍTULOS */
h2 {
    margin-bottom:20px;
    font-weight:600;
}

/* RADIO */
label {
    display:block;
    margin:6px 0;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
    <div id="tempo">⏱ 600s</div>
    <div id="alertas">⚠ 0</div>
    <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</div>

<div class="container" id="prova"></div>

<div class="container hidden" id="admin">
    <h2>Painel do Professor</h2>

    <input id="pergunta" placeholder="Pergunta">
    <input id="a" placeholder="Alternativa A">
    <input id="b" placeholder="Alternativa B">
    <input id="c" placeholder="Alternativa C">
    <input id="correta" placeholder="Resposta correta (A, B ou C)">

    <button onclick="addQuestao()">Adicionar</button>

    <h3>Questões</h3>
    <div id="lista"></div>

    <h3>Respostas</h3>
    <button onclick="verRespostas()">Ver</button>
    <pre id="respostas"></pre>
</div>

<script>
let tempo = 600;
let saidas = 0;
let questoes = JSON.parse(localStorage.getItem("questoes")) || [];
let respostas = JSON.parse(localStorage.getItem("respostas")) || [];

// TIMER
setInterval(()=>{
    tempo--;
    tempoEl.innerText = "⏱ " + tempo + "s";

    if(tempo <= 0) finalizar();
},1000);

// SAÍDA
document.addEventListener("visibilitychange", ()=>{
    if(document.hidden){
        saidas++;
        alertas.innerText = "⚠ " + saidas;

        if(saidas >= 1){
            alert("Prova reiniciada!");
            location.reload();
        }
    }
});

// PROVA
function carregar(){
    let html = "<h2>Prova</h2>";

    if(questoes.length === 0){
        html += "<p>Nenhuma questão cadastrada.</p>";
    }

    questoes.forEach((q,i)=>{
        html += `
        <div class="questao">
            <p>${q.pergunta}</p>
            <label><input type="radio" name="q${i}" value="A"> ${q.a}</label>
            <label><input type="radio" name="q${i}" value="B"> ${q.b}</label>
            <label><input type="radio" name="q${i}" value="C"> ${q.c}</label>
        </div>`;
    });

    html += `<button onclick="finalizar()">Finalizar</button>`;
    prova.innerHTML = html;
}

// FINALIZAR
function finalizar(){
    let pontos = 0;
    let resp = [];

    questoes.forEach((q,i)=>{
        let r = document.querySelector(`input[name="q${i}"]:checked`);
        let v = r ? r.value : "-";

        resp.push(v);
        if(v === q.correta) pontos++;
    });

    respostas.push(resp);
    localStorage.setItem("respostas", JSON.stringify(respostas));

    alert("Nota: " + pontos);
    location.reload();
}

// ADMIN
function loginAdmin(){
    let s = prompt("Senha:");
    if(s === "prof321"){
        admin.classList.remove("hidden");
        prova.classList.add("hidden");
        listar();
    }
}

// ADD
function addQuestao(){
    let q = {
        pergunta: pergunta.value,
        a: a.value,
        b: b.value,
        c: c.value,
        correta: correta.value.toUpperCase()
    };

    questoes.push(q);
    localStorage.setItem("questoes", JSON.stringify(questoes));
    listar();
}

// LISTAR
function listar(){
    let html = "";
    questoes.forEach((q,i)=>{
        html += `
        <div class="questao">
            ${q.pergunta}
            <br>
            <button onclick="remover(${i})">Excluir</button>
        </div>`;
    });
    lista.innerHTML = html;
}

// REMOVER
function remover(i){
    questoes.splice(i,1);
    localStorage.setItem("questoes", JSON.stringify(questoes));
    listar();
}

// RESPOSTAS
function verRespostas(){
    respostas.innerText = JSON.stringify(respostas, null, 2);
}

// INIT
carregar();
</script>

</body>
</html>
