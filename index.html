<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Prova Online</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

#alerta {
    position: fixed;
    top: 0;
    width: 100%;
    background: red;
    color: white;
    text-align: center;
    padding: 10px;
    font-weight: bold;
    z-index: 999;
}

iframe {
    width: 100%;
    height: 100vh;
    border: none;
}
</style>

<script>

// Controle de saída
let saiuDaProva = false;

// Bloquear botão direito
document.addEventListener("contextmenu", e => e.preventDefault());

// Detectar troca de aba
document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        saiuDaProva = true;
    } else {
        if (saiuDaProva) {
            alert("⚠️ Você saiu da prova! A avaliação será reiniciada.");
            location.reload(); // REINICIA A PROVA
        }
    }
});

// Detectar mudança de janela (alt+tab, minimizar)
window.onblur = function() {
    saiuDaProva = true;
};

window.onfocus = function() {
    if (saiuDaProva) {
        alert("⚠️ Você saiu da prova! A avaliação será reiniciada.");
        location.reload();
    }
};

// Aviso ao tentar sair
window.onbeforeunload = function() {
    return "Você está em uma avaliação. Deseja sair?";
};

// Tela cheia automática
function entrarTelaCheia() {
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }
}

</script>
</head>

<body onload="entrarTelaCheia()">

<div id="alerta">
🚫 PROVA EM ANDAMENTO - SAIR DA TELA IRÁ REINICIAR A AVALIAÇÃO
</div>

<iframe src="https://forms.office.com/Pages/ResponsePage.aspx?id=1JjG0Ork6U6nnfLXp4OZyAkLBLNSedNApafS5DptQ_BUOUZGSERQT0RDWlVUMldRVU1OTEQ0REpMNy4u"></iframe>

</body>
</html>
